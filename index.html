<!DOCTYPE html>
<html lang="ja">
<head><meta name="google-site-verification" content="2I7SRMMNr-yNO9sUo-wX905dkJkFKEllGsVjcbcotz4" />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>くれよん 神経衰弱</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#fff9fe;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:1rem}
#game{font-family:sans-serif;max-width:680px;width:100%;text-align:center}
h2{font-size:22px;font-weight:600;color:#8a3d8a;margin-bottom:.3rem}
#info{font-size:14px;color:#888;margin-bottom:.8rem}
#grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:.8rem}
.card{aspect-ratio:1;perspective:600px;cursor:pointer;transition:transform .15s}
.card:hover:not(.flipped):not(.matched){transform:scale(1.07)}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .4s cubic-bezier(.4,0,.2,1)}
.card.flipped .card-inner,.card.matched .card-inner{transform:rotateY(180deg)}
.card-back,.card-front{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:14px;display:flex;align-items:center;justify-content:center}
.card-back{font-size:26px;border:2px solid #f0b8e8}
.card-front{transform:rotateY(180deg);background:#fff;border:2px solid #e0d0f0}
.card.matched .card-front{border-color:#a0d8a0;background:#f4fff4}
@keyframes pop{0%{transform:rotateY(180deg) scale(1)}50%{transform:rotateY(180deg) scale(1.15)}100%{transform:rotateY(180deg) scale(1)}}
.card.matched .card-inner{animation:pop .3s ease}
#restartBtn{background:#f8e1f4;border:1.5px solid #e8b8e8;border-radius:20px;padding:10px 28px;font-size:15px;cursor:pointer;color:#8a3d8a;font-weight:600}
#restartBtn:hover{background:#f0cff0}
#winMsg{font-size:20px;font-weight:600;color:#8a3d8a;margin-bottom:.6rem;display:none}
#confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.cp{position:absolute;animation:fall linear forwards}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<div id="game">
  <h2>🖍️ くれよん 神経衰弱</h2>
  <div id="info">ペアを見つけよう！　マッチ: <span id="matches">0</span>/9　　めくった回数: <span id="flips">0</span></div>
  <div id="grid"></div>
  <div id="winMsg">🌟 やったー！全部そろえたよ！ 🌟</div>
  <button id="restartBtn" onclick="initGame()">もう一度あそぶ</button>
</div>
<div id="confetti-container"></div>

<script>
const AC=window.AudioContext||window.webkitAudioContext;
let ac=null;
const ctx=()=>{if(!ac)ac=new AC();return ac;};
const beep=(f,t,d,type='sine',vol=.18)=>{try{const a=ctx(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type=type;o.frequency.value=f;g.gain.setValueAtTime(vol,a.currentTime+t);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+t+d);o.start(a.currentTime+t);o.stop(a.currentTime+t+d+.01);}catch(e){}};
const playFlip=()=>beep(520,.0,.1,'sine',.15);
const playMiss=()=>beep(200,.0,.15,'sawtooth',.1);
const playMatch=()=>{beep(523,.0,.18,'triangle',.2);beep(659,.1,.18,'triangle',.2);beep(784,.2,.18,'triangle',.2);};
const playWin=()=>{[523,659,784,1047].forEach((f,i)=>beep(f,i*.15,.35,'triangle',.25));};

function spawnConfetti(){
  const c=document.getElementById('confetti-container');c.innerHTML='';
  const cols=['#f9a8d4','#fde68a','#a7f3d0','#bfdbfe','#ddd6fe','#fed7aa','#f0abfc'];
  for(let i=0;i<80;i++){
    const el=document.createElement('div');el.className='cp';
    el.style.cssText=`left:${Math.random()*100}vw;width:${8+Math.random()*8}px;height:${8+Math.random()*8}px;background:${cols[i%cols.length]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.2+Math.random()*1.8}s;animation-delay:${Math.random()*.8}s`;
    c.appendChild(el);
  }
  setTimeout(()=>c.innerHTML='',3500);
}

const ns='http://www.w3.org/2000/svg';
function mkSVG(fn){
  const s=document.createElementNS(ns,'svg');
  s.setAttribute('viewBox','0 0 100 100');s.setAttribute('width','100%');s.setAttribute('height','100%');
  const g=document.createElementNS(ns,'g');s.appendChild(g);fn(g);return s;
}
const h=(g,html)=>g.innerHTML=html;

function drawHippo(g){h(g,`
  <ellipse cx="50" cy="68" rx="26" ry="20" fill="#d8a8e8"/>
  <ellipse cx="50" cy="70" rx="22" ry="16" fill="#ffb8d8"/>
  <rect x="28" y="62" width="44" height="18" rx="6" fill="#ffb8d8"/>
  <text x="50" y="75" font-size="5.5" text-anchor="middle" fill="#c04878" font-weight="500">くれよん</text>
  <ellipse cx="50" cy="52" rx="14" ry="8" fill="#e8c8f0"/>
  <ellipse cx="50" cy="36" rx="28" ry="26" fill="#e8c8f0"/>
  <ellipse cx="24" cy="22" rx="9" ry="10" fill="#e0b8e8"/>
  <ellipse cx="24" cy="22" rx="5" ry="6" fill="#f8d0f0"/>
  <ellipse cx="76" cy="22" rx="9" ry="10" fill="#e0b8e8"/>
  <ellipse cx="76" cy="22" rx="5" ry="6" fill="#f8d0f0"/>
  <ellipse cx="50" cy="46" rx="16" ry="11" fill="#f0d0f8"/>
  <ellipse cx="50" cy="47" rx="12" ry="7" fill="#f8c8e8"/>
  <ellipse cx="45" cy="47" rx="3" ry="2.5" fill="#c890c8"/>
  <ellipse cx="55" cy="47" rx="3" ry="2.5" fill="#c890c8"/>
  <ellipse cx="38" cy="30" rx="8" ry="8.5" fill="#fff"/>
  <ellipse cx="62" cy="30" rx="8" ry="8.5" fill="#fff"/>
  <circle cx="39" cy="31" r="5.5" fill="#7a3a9a"/>
  <circle cx="63" cy="31" r="5.5" fill="#7a3a9a"/>
  <circle cx="40" cy="31" r="3" fill="#2a1040"/>
  <circle cx="64" cy="31" r="3" fill="#2a1040"/>
  <circle cx="42" cy="29" r="1.5" fill="#fff"/>
  <circle cx="66" cy="29" r="1.5" fill="#fff"/>
  <path d="M31 23 Q33 19 35 22" stroke="#9a60b0" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M34 21 Q37 17 39 21" stroke="#9a60b0" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M57 21 Q60 17 62 21" stroke="#9a60b0" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M61 21 Q65 18 66 22" stroke="#9a60b0" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <ellipse cx="30" cy="38" rx="7" ry="4" fill="#f8a0c8" opacity=".55"/>
  <ellipse cx="70" cy="38" rx="7" ry="4" fill="#f8a0c8" opacity=".55"/>
  <path d="M42 43 Q50 49 58 43" stroke="#c070a0" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <ellipse cx="26" cy="68" rx="7" ry="12" fill="#d8a8e8" transform="rotate(-15,26,68)"/>
  <ellipse cx="74" cy="68" rx="7" ry="12" fill="#d8a8e8" transform="rotate(15,74,68)"/>
  <ellipse cx="38" cy="84" rx="8" ry="7" fill="#d8a8e8"/>
  <ellipse cx="62" cy="84" rx="8" ry="7" fill="#d8a8e8"/>
`);}

function drawWarbler(g){h(g,`
  <ellipse cx="50" cy="62" rx="24" ry="18" fill="#8ec85a"/>
  <ellipse cx="50" cy="42" rx="20" ry="18" fill="#a0d86a"/>
  <ellipse cx="38" cy="28" rx="10" ry="10" fill="#a0d86a"/>
  <ellipse cx="62" cy="28" rx="10" ry="10" fill="#a0d86a"/>
  <circle cx="38" cy="26" r="4" fill="#1a5a00"/>
  <circle cx="62" cy="26" r="4" fill="#1a5a00"/>
  <circle cx="39" cy="25" r="1.5" fill="#fff"/>
  <circle cx="63" cy="25" r="1.5" fill="#fff"/>
  <path d="M44 50 Q50 46 56 50" stroke="#5a9830" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <ellipse cx="50" cy="52" rx="7" ry="4.5" fill="#d0e8a0"/>
  <path d="M32 52 Q16 44 14 56 Q26 60 32 52Z" fill="#78b848"/>
  <path d="M68 52 Q84 44 86 56 Q74 60 68 52Z" fill="#78b848"/>
  <path d="M44 76 L38 92 M56 76 L62 92" stroke="#d4a050" stroke-width="3.5" stroke-linecap="round"/>
  <ellipse cx="50" cy="50" rx="8" ry="5" fill="#d4a050"/>
  <path d="M42 48 L34 40" stroke="#d4a050" stroke-width="3" stroke-linecap="round"/>
`);}

function drawYellowBird(g){h(g,`
  <ellipse cx="50" cy="62" rx="24" ry="18" fill="#f5d040"/>
  <ellipse cx="50" cy="42" rx="20" ry="18" fill="#f8e060"/>
  <ellipse cx="38" cy="28" rx="10" ry="10" fill="#f8e060"/>
  <ellipse cx="62" cy="28" rx="10" ry="10" fill="#f8e060"/>
  <circle cx="38" cy="26" r="4" fill="#4a3800"/>
  <circle cx="62" cy="26" r="4" fill="#4a3800"/>
  <circle cx="39" cy="25" r="1.5" fill="#fff"/>
  <circle cx="63" cy="25" r="1.5" fill="#fff"/>
  <path d="M44 50 Q50 46 56 50" stroke="#c89010" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M32 52 Q16 44 14 56 Q26 60 32 52Z" fill="#f0c830"/>
  <path d="M68 52 Q84 44 86 56 Q74 60 68 52Z" fill="#f0c830"/>
  <path d="M44 76 L38 92 M56 76 L62 92" stroke="#e07818" stroke-width="3.5" stroke-linecap="round"/>
  <ellipse cx="50" cy="50" rx="8" ry="5" fill="#e07818"/>
  <path d="M42 48 L34 40" stroke="#e07818" stroke-width="3" stroke-linecap="round"/>
`);}

function drawCrayon(g,body,dark,tip,label){h(g,`
  <polygon points="50,92 40,76 60,76" fill="${tip}"/>
  <rect x="36" y="70" width="28" height="7" rx="1.5" fill="#f0d060"/>
  <rect x="33" y="28" width="34" height="44" rx="8" fill="${body}"/>
  <rect x="35" y="40" width="30" height="18" rx="3" fill="#fffef5" opacity=".88"/>
  <text x="50" y="49" font-size="5.2" text-anchor="middle" fill="${dark}" font-weight="500">くれよん</text>
  <text x="50" y="56" font-size="6" text-anchor="middle" fill="${dark}" font-weight="500">${label}</text>
  <rect x="33" y="18" width="34" height="12" rx="5" fill="${dark}"/>
  <ellipse cx="50" cy="18" rx="17" ry="5.5" fill="${body}" opacity=".55"/>
  <rect x="33" y="22" width="34" height="4" fill="${dark}" opacity=".3"/>
`);}

const chars=[
  {id:'hippo',   back:'#f9d0f0', fn:g=>drawHippo(g)},
  {id:'warbler', back:'#d8f0d0', fn:g=>drawWarbler(g)},
  {id:'ybird',   back:'#fff8c0', fn:g=>drawYellowBird(g)},
  {id:'cred',    back:'#ffd0d0', fn:g=>drawCrayon(g,'#f07070','#a02020','#d84040','赤')},
  {id:'cblue',   back:'#d0d8ff', fn:g=>drawCrayon(g,'#7090f0','#2040b0','#4060d8','青')},
  {id:'cyellow', back:'#fffac0', fn:g=>drawCrayon(g,'#f8d840','#907000','#d8a818','黄')},
  {id:'cpurple', back:'#e8d0ff', fn:g=>drawCrayon(g,'#b878e8','#6020a0','#8840c8','紫')},
  {id:'clblue',  back:'#c8f0ff', fn:g=>drawCrayon(g,'#60d0f0','#1880a8','#38b8d8','水')},
  {id:'cblack',  back:'#d8d8d8', fn:g=>drawCrayon(g,'#787878','#181818','#404040','黒')},
];

let flipped=[],matched=0,flips=0,lock=false;

function initGame(){
  matched=0;flips=0;flipped=[];lock=false;
  document.getElementById('matches').textContent='0';
  document.getElementById('flips').textContent='0';
  document.getElementById('winMsg').style.display='none';
  const pairs=[...chars,...chars].sort(()=>Math.random()-.5);
  const grid=document.getElementById('grid');grid.innerHTML='';
  pairs.forEach(c=>{
    const card=document.createElement('div');card.className='card';card.dataset.id=c.id;
    const inner=document.createElement('div');inner.className='card-inner';
    const back=document.createElement('div');back.className='card-back';
    back.style.background=c.back;back.style.borderColor=c.back;back.textContent='🖍️';
    const front=document.createElement('div');front.className='card-front';
    front.appendChild(mkSVG(c.fn));
    inner.appendChild(back);inner.appendChild(front);card.appendChild(inner);
    card.addEventListener('click',()=>flip(card));
    grid.appendChild(card);
  });
}

function flip(card){
  if(lock||card.classList.contains('flipped')||card.classList.contains('matched'))return;
  playFlip();card.classList.add('flipped');flipped.push(card);
  if(flipped.length===2){flips++;document.getElementById('flips').textContent=flips;lock=true;setTimeout(check,900);}
}
function check(){
  const [a,b]=flipped;
  if(a.dataset.id===b.dataset.id){
    a.classList.add('matched');b.classList.add('matched');matched++;
    document.getElementById('matches').textContent=matched;playMatch();
    if(matched===chars.length){playWin();spawnConfetti();document.getElementById('winMsg').style.display='block';}
  } else {playMiss();a.classList.remove('flipped');b.classList.remove('flipped');}
  flipped=[];lock=false;
}
initGame();
</script>
</body>
</html>
